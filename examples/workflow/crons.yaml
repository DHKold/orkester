kind: workaholic/Cron:1.0
name: example-cron
version: 1.0.0
metadata:
  namespace: testing
  description: "Example cron that runs a workflow every day at 01:00 UTC"
  tags: ["example", "cron", "scheduled"]
spec:
  enabled: true
  work_ref: testing/example_work:1
  schedules:
    - "0 1 * * *"     # every day at 01:00 UTC
    - "30 14 * * 1-5" # every weekday at 14:30 UTC
  timezone: UTC
  validity:
    start: "2024-01-01T00:00:00Z"
    end: "2024-12-31T23:59:59Z"
    max_runs: 100
  params:
    - name: version
      value: "1.0.0"
  concurrency:
    same_cron: skip # if a previous run of this cron is still executing, skip the new run
    different_cron: allow # if another cron is executing, allow this cron to run anyway
    manual: allow # if a manual run is still executing, allow the cron to start a new run anyway
  failure_policy:
    max_consecutive_failures: 3
    action: disable # if there are 3 consecutive failures, disable the cron until manually re-enabled
status:
  last_scheduled_time: "2026-03-01T01:00:00Z"
  next_scheduled_time: "2026-03-26T01:00:00Z"
  last_run_status: succeeded
  consecutive_failures: 0
  run_count: 10