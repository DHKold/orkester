kind: workaholic/TaskRunRequest:1.0
name: 36cc8e4-8b9a-4d9b-9c3a-123456789abc
version: 1.0.0
metadata:
  namespace: testing
  description: "Resolved execution request for step `step1` of example-work-run-request"
spec:
  workRef: testing/example_work:1.0.0
  taskRef: testing/set-delay:1.0.0
  workRunRequestRef: worker://ffae8b9a-7c6d-4e5f-8a1b-123456789abc:1.0.0
  stepName: step1
  inputs:
    - name: source_code
      description: "Directory containing the Rust source code to build"
      type: directory
      required: true
      from:
        uri: "registry://path/to/source_code:1.0.0"
    - name: is_release
      description: "Whether to build in release mode"
      type: boolean
      required: false
      from:
        value: false
    - name: log_level
      description: "Log level for the build process"
      type: string
      required: false
      from:
        value: "info"
  outputs:
    - name: binary
      description: "The resulting binary artifact from the build"
      type: file
      to:
        uri: "registry://path/to/binary:1.0.0"
        retention: 10d
    - name: return_code
      description: "The return code of the build process"
      type: integer
      to:
        variable: return_code
  execution:
    kind: workaholic/shell-runner:1.0
    profile: default-shell
    config:
      env:
        IS_RELEASE: "${task://inputs?is_release}"
        LOG_LEVEL: "${task://inputs?log_level}"
        BINARY_NAME: "my_application"
      files_inputs:
        - input: source_code
          path: /tmp/source_code
      files_outputs:
        - output: binary
          path: /tmp/binary
      env_outputs:
        - output: return_code
          variable: RETURN_CODE
      script: |
        set -e
        echo "Building Rust project in /tmp/source_code..."
        cd "/tmp/source_code"
        if [ "${IS_RELEASE}" = "true" ]; then
          cargo build --release
          RETURN_CODE=$?
          cp target/release/${BINARY_NAME} /tmp/binary
        else
          cargo build
          RETURN_CODE=$?
          cp target/debug/${BINARY_NAME} /tmp/binary
        fi
        echo "Build complete. Binary is at /tmp/binary"
---
kind: workaholic/TaskRunRequest:1.0
name: d85ab9c7-1234-4e5f-9a1b-123456789abc
version: 1.0.0
metadata:
  namespace: testing
  description: "Resolved execution request for step `echo-hello` of example-work-run-request"
spec:
  workRef: testing/example-work:1.0.0
  taskRef: testing/echo-hello:1.0.0
  workRunRequestRef: worker://ffae8b9a-7c6d-4e5f-8a1b-123456789abc:1.0.0
  stepName: step2
  inputs:
    - name: repository-uri
      description: "The URI of the repository to publish the binary artifact to"
      type: string
      required: true
      from:
        value: "registry://path/to/repository:1.0.0"
    - name: binary
      description: "The binary artifact to publish"
      type: file
      required: true
      from:
        uri: "registry://path/to/binary:1.0.0"
    - name: version
      description: "The version to publish the artifact as"
      type: string
      required: false
      from:
        value: "1.0.0"
  outputs:
    - name: manifest
      description: "The manifest of the published artifact in the repository"
      type: file
      to:
        uri: "registry://path/to/manifest:1.0.0"
        retention: 10d
  execution:
    kind: workaholic/shell-runner:1.0
    profile: default-shell
    config:
      env:
        REPOSITORY_URI: "${task://inputs?repository-uri}"
        VERSION: "${task://inputs?version}"
      files_inputs:
        - input: binary
      files_outputs:
        - output: manifest
      env_outputs:
        - output: return_code
          variable: RETURN_CODE
      script: |
        set -e
        echo "Publishing binary to ${REPOSITORY_URI} with version ${VERSION}..."
        # Simulate publishing by copying the binary to a new location and creating a manifest file
        mkdir -p /tmp/published
        cp "${binary}" "/tmp/published/my_application_${VERSION}"
        echo "manifest: /tmp/published/my_application_${VERSION}" > /tmp/published/manifest
        RETURN_CODE=0
        echo "Publish complete. Manifest is at /tmp/published/manifest"