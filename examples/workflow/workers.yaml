kind: workaholic/WorkRunner:1.0
name: WorkRunner-1
version: 1.0.0
metadata:
  description: "Example WorkRunner configuration"
  namespace: testing
spec:
  kind: workaholic/ThreadWorkRunner:1.0
  config:
    thread_count: 4
  concurrency:
    max_work_runs: 4
    max_task_runs: 16
  quotas:
    max_work_runs: 10
    max_task_runs: 50
  restrictions:
    taskRunners: [shell, container]
  labels:
    team: example
status:
  state: active
  active_work_runs: 0
  active_task_runs: 0
  stateHistory:
    - state: active
      timestamp: "2024-01-01T00:00:00Z"
      reason: "End of maintenance"
    - state: inactive
      timestamp: "2023-12-01T00:00:00Z"
      reason: "Scheduled maintenance"
    - state: creating
      timestamp: "2023-11-01T00:00:00Z"
      reason: "Initial creation"