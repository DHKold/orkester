kind: orkester/namespace:1.0
name: testing
version: 1.0.0
metadata:
  description: Default namespace for general-purpose workflows
spec:
  retention:
    work_runs_days: 30
    task_runs_days: 30
    logs_days: 7
---
apiVersion: orkester.io/v1
kind: Namespace
name: client-nsi-production
version: "1.0.0"
metadata:
  description: "Namespace for client NSI production workflows"
  labels:
    team: nsi
    env: production
spec:
  max_concurrent_workflows: 10
---
apiVersion: orkester.io/v1
kind: Namespace
name: client-nsi-development
version: "1.0.0"
metadata:
  description: "Namespace for client NSI development and testing workflows"
  labels:
    team: nsi
    env: dev
spec:
  max_concurrent_workflows: 3
---
apiVersion: orkester.io/v1
kind: Namespace
name: mss-production
version: "1.0.0"
metadata:
  description: "Namespace for MSS production workflows"
  labels:
    team: mss
    env: production
spec:
  max_concurrent_workflows: 5
