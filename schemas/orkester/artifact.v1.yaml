$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://huforge.com/schemas/orkester/artifact.v1.yaml"
title: Orkester Artifact v1
type: object

allOf:
  - $ref: "common/document.yaml"

required:
  - kind
  - name
  - version
  - spec

properties:
  kind:
    const: "orkester/artifact:1.0"

  spec:
    type: object
    required:
      - uri
    properties:
      owner_ref:
        type: string
      uri:
        type: string
        minLength: 1
      media_type:
        type: string
      size_bytes:
        type: integer
        minimum: 0
      checksum:
        type: object
        properties:
          sha256:
            type: string
        additionalProperties: false
    additionalProperties: false

  status:
    type: object
    properties:
      deleted:
        type: boolean
        default: false
    additionalProperties: true
