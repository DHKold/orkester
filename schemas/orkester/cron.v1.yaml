$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://huforge.com/schemas/orkester/cron.v1.yaml"
title: Orkester Cron v1
type: object

allOf:
  - $ref: "common/document.yaml"

required:
  - kind
  - name
  - version
  - spec

properties:
  kind:
    const: "orkester/cron:1.0"

  spec:
    type: object
    required:
      - work_ref
      - schedules
    properties:
      work_ref:
        type: string
        pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*:[0-9]+\\.[0-9]+\\.[0-9]+(-[A-Za-z0-9.-]+)?$"

      schedules:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1

      timezone:
        type: string
        default: "UTC"

      validity:
        type: object
        properties:
          start_at:
            type: string
            format: date-time
          end_at:
            type: string
            format: date-time
        additionalProperties: false

      max_runs:
        type: integer
        minimum: 1

      params:
        type: object
        default: {}
        additionalProperties: true

      enabled:
        type: boolean
        default: true

      concurrency:
        type: object
        properties:
          same_cron:
            type: string
            enum: [skip, replace, add, wait]
            default: skip
          other_crons:
            type: string
            enum: [skip, replace, add, wait]
            default: add
          manual:
            type: string
            enum: [skip, replace, add, wait]
            default: add
        additionalProperties: false

      failure_policy:
        type: object
        properties:
          max_consecutive_failures:
            type: integer
            minimum: 1
          action:
            type: string
            enum: [none, pause, disable]
            default: none
        additionalProperties: false

    additionalProperties: false

  status:
    type: object
    properties:
      deleted:
        type: boolean
        default: false
    additionalProperties: true
