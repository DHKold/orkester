$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://huforge.com/schemas/orkester/namespace.v1.yaml"
title: Orkester Namespace v1
type: object

allOf:
  - $ref: "common/document.yaml"

required:
  - kind
  - name
  - version
  - spec

properties:
  kind:
    const: "orkester/namespace:1.0"

  spec:
    type: object
    properties:
      retention:
        type: object
        properties:
          work_runs_days:
            type: integer
            minimum: 1
          task_runs_days:
            type: integer
            minimum: 1
          logs_days:
            type: integer
            minimum: 1
          metrics_days:
            type: integer
            minimum: 1
          artifacts_days:
            type: integer
            minimum: 1
        additionalProperties: false
    additionalProperties: false

  status:
    type: object
    properties:
      deleted:
        type: boolean
        default: false
    additionalProperties: true
