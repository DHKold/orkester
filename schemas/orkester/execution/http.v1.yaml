$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://huforge.com/schemas/orkester/execution/http.v1.yaml"
title: Orkester HTTP Execution v1
type: object

required:
  - kind
  - config

properties:
  kind:
    const: http

  profile:
    type: string
    minLength: 1

  override:
    type: object
    default: {}

  config:
    type: object
    required:
      - method
      - url
    properties:
      method:
        type: string
        minLength: 1

      url:
        type: string
        minLength: 1

      headers:
        type: object
        default: {}
        additionalProperties:
          type: string

      query:
        type: object
        default: {}
        additionalProperties: true

      body:
        default: null

      timeout_seconds:
        type: integer
        minimum: 1

      expected_status:
        type: array
        default: []
        items:
          type: integer
          minimum: 100
          maximum: 599

    additionalProperties: false

additionalProperties: false
