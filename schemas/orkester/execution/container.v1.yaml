$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://huforge.com/schemas/orkester/execution/container.v1.yaml"
title: Orkester Container Execution v1
type: object

required:
  - kind
  - config

properties:
  kind:
    const: container

  profile:
    type: string
    minLength: 1

  config:
    type: object
    required:
      - image
    properties:
      image:
        type: string
        minLength: 1

      script:
        type: string
        minLength: 1

      command:
        type: array
        items:
          type: string
        minItems: 1

      args:
        type: array
        default: []
        items:
          type: string

      env:
        type: object
        default: {}
        additionalProperties:
          type: string

      cwd:
        type: string
        minLength: 1

      volumes:
        type: array
        default: []
        items:
          type: object
          required:
            - source
            - target
          properties:
            source:
              type: string
              minLength: 1
            target:
              type: string
              minLength: 1
            read_only:
              type: boolean
              default: false
          additionalProperties: false

      network:
        type: string

      user:
        type: string

      privileged:
        type: boolean
        default: false

    oneOf:
      - required: [script]
      - required: [command]

    additionalProperties: false

additionalProperties: false
