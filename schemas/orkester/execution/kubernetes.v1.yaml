$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://huforge.com/schemas/orkester/execution/kubernetes.v1.yaml"
title: Orkester Kubernetes Execution v1
type: object

required:
  - kind
  - config

properties:
  kind:
    const: kubernetes

  profile:
    type: string
    minLength: 1

  config:
    type: object
    required:
      - image
    properties:
      image:
        type: string
        minLength: 1

      script:
        type: string
        minLength: 1

      command:
        type: array
        items:
          type: string
        minItems: 1

      args:
        type: array
        default: []
        items:
          type: string

      env:
        type: object
        default: {}
        additionalProperties:
          type: string

      resources:
        type: object
        properties:
          requests:
            type: object
            additionalProperties:
              type: string
          limits:
            type: object
            additionalProperties:
              type: string
        additionalProperties: false

      volumes:
        type: array
        default: []
        items:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              minLength: 1
            mount_path:
              type: string
            read_only:
              type: boolean
              default: false
          additionalProperties: true

      service_account:
        type: string

      job_ttl_seconds:
        type: integer
        minimum: 0

      backoff_limit:
        type: integer
        minimum: 0

    oneOf:
      - required: [script]
      - required: [command]

    additionalProperties: false

additionalProperties: false
