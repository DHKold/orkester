$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://huforge.com/schemas/orkester/execution/shell.v1.yaml"
title: Orkester Shell Execution v1
type: object

required:
  - kind
  - config

properties:
  kind:
    const: shell

  profile:
    type: string
    minLength: 1

  config:
    type: object
    required:
      - script
    properties:
      script:
        type: string
        minLength: 1
    additionalProperties: false

additionalProperties: false
