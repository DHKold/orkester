$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://huforge.com/schemas/orkester/task.v1.yaml"
title: Orkester Task v1
type: object

allOf:
  - $ref: "common/document.yaml"

required:
  - kind
  - name
  - version
  - spec

properties:
  kind:
    const: "orkester/task:1.0"

  spec:
    type: object
    required:
      - execution
    properties:
      retry_count:
        type: integer
        minimum: 0
        default: 0

      timeout_seconds:
        type: integer
        minimum: 1

      inputs:
        type: array
        default: []
        items:
          type: object
          required:
            - name
            - type
          properties:
            name:
              type: string
              minLength: 1
            type:
              type: string
              minLength: 1
            required:
              type: boolean
              default: false
            default: true
          additionalProperties: true

      outputs:
        type: array
        default: []
        items:
          type: object
          required:
            - name
            - type
          properties:
            name:
              type: string
              minLength: 1
            type:
              type: string
              minLength: 1
          additionalProperties: true

      execution:
        type: object
        required:
          - kind
        properties:
          kind:
            type: string
            minLength: 1

          profile:
            type: string
            minLength: 1

          config:
            type: object
            default: {}
        additionalProperties: false

    additionalProperties: false

  status:
    type: object
    properties:
      deleted:
        type: boolean
        default: false
    additionalProperties: true