$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://huforge.com/schemas/orkester/worker.v1.yaml"
title: Orkester Worker v1
type: object

allOf:
  - $ref: "common/document.yaml"

required:
  - kind
  - name
  - version
  - spec

properties:
  kind:
    const: "orkester/worker:1.0"

  spec:
    type: object
    properties:
      enabled:
        type: boolean
        default: true

      scope:
        type: object
        properties:
          namespaces:
            type: array
            default: []
            items:
              type: string
              minLength: 1
        additionalProperties: false

      concurrency:
        type: object
        properties:
          max_work_runs:
            type: integer
            minimum: 1
          max_task_runs:
            type: integer
            minimum: 1
        additionalProperties: false

      task_runners:
        type: array
        default: []
        items:
          type: string
          minLength: 1

      pools:
        type: array
        default: []
        items:
          type: string
          minLength: 1

    additionalProperties: false

  status:
    type: object
    properties:
      deleted:
        type: boolean
        default: false
    additionalProperties: true
