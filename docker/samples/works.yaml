# ── Smoke-test Work ──────────────────────────────────────────────────────────
# Single-step Work that runs the echo-hello task in the default namespace.
apiVersion: orkester.io/v1
kind: Work
name: smoke-test
version: "1.0.0"
metadata:
  namespace: testing
  description: "Quick smoke-test: run echo-hello and verify the platform is reachable"
  labels:
    category: test
spec:
  inputs:
    DELAY_SECONDS: "How long to sleep between the two echo messages (seconds)."
  steps:
    - id: set-delay
      task: set-delay
      dependsOn: []
    - id: run-echo
      task: echo-hello
      dependsOn: ["set-delay"]
      inputs:
        # Default value used when DELAY_SECONDS is not set in work_context.
        DELAY_SECONDS: "3"
      allowFailure: false
---
