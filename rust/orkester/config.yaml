# Orkester host configuration — sample setup
#
# Demonstrates:
#   - Loading the sample plugin
#   - Instantiating PingServer, LoggingServer, and RestServer
#   - Hub routing: log/Entry events → LoggingServer; catch-all → drop

plugins:
  directories:
    - path: target/debug   # built by: cargo build -p orkester-plugin-sample

servers:
  - name: ping-server
    kind: sample/PingServer:1.0

  - name: log-server
    kind: sample/LoggingServer:1.0
    config:
      formatter:
        kind: text
      consumers:
        - kind: console
        - kind: file
          path: orkester.log

  - name: rest-server
    kind: sample/RestServer:1.0
    config:
      bind: "127.0.0.1:8080"
      routes:
        - path:   /ping
          method: GET
          action: ping/Ping
        - path:   /health
          method: GET
          action: ping/Ping

hub:
  queue:
    waiting_capacity: 4096
    dispatch_capacity: 256
    backpressure: reject

  routes:
    # Route all log/Entry events to the LoggingServer
    - name: route-logs
      filters:
        - kind: match
          config:
            field: kind
            value: "^log/"
            mode:  regex
      targets:
        - kind: components
          config:
            targets:
              - name: log-server

    # Catch-all: silently drop everything else
    - name: drop-unhandled
      filters:
        - kind: all
      targets:
        - kind: drop
