# Orkester Host - Sample Configuration
#
# Build the sample plugin first:
#   cargo build -p orkester-plugin-sample
#
# Then run from rust/orkester/:
#   cargo run -p orkester-host -- --config samples/config.yaml
#
# Override a value at runtime with --set KEY=VALUE, e.g.:
#   --set servers.0.config.min_level=debug

plugins:
  directories:
    # Compiled cdylib produced by: cargo build -p orkester-plugin-sample
    - path: target/debug
      recursive: false

# Each entry asks the hub to instantiate one component from the loaded plugins.
# kind   - fully-qualified component kind (must match a registered factory)
# name   - display name used in logs and the routing report
# config - forwarded verbatim to the component factory; must match its schema
#
# Routing: when two servers handle the same action the FIRST one in this list
# wins. Route to a specific server by giving its actions a unique prefix.
servers:

  # Console logger
  # Handles:  sample/Log
  # Policy:   only WARN and above reach stdout (low-noise production default)
  - kind: sample/Logger:1.0
    name: console-logger
    config:
      min_level: warn
      backends:
        - type: console

  # Audit logger
  # Handles:  sample/Log  (routing falls to console-logger; see routing note)
  # Policy:   captures DEBUG-and-above to stdout AND to a local file.
  # Tip:      to route independently use a separate action prefix, e.g. audit/Log
  - kind: sample/Logger:1.0
    name: audit-logger
    config:
      min_level: debug
      backends:
        - type: console
        - type: file
          path: orkester-audit.log   # written to CWD (rust/orkester/)

  # Calculator
  # Handles:  sample/Calculate
  # Stateless four-operation arithmetic service; no config required.
  - kind: sample/Calculator:1.0
    name: calculator

  # Request counter
  # Handles:  sample/Counter/Get
  #           sample/Counter/Increment
  #           sample/Counter/Decrement
  #           sample/Counter/Reset
  # Tracks an in-memory integer with hard min/max bounds.
  # Use it to count events, measure throughput, or guard rate limits.
  - kind: sample/Counter:1.0
    name: request-counter
    config:
      initial: 0
      min: 0
      max: 999999

  # Health-check echo
  # Handles:  sample/Echo
  # Echoes every message back with a configurable prefix.
  # Useful as a liveness probe or round-trip-latency baseline.
  - kind: sample/Echo:1.0
    name: health-echo
    config:
      prefix: "pong: "

# ── Message hub ───────────────────────────────────────────────────────────────
# Deserialized into orkester_plugin::hub::HubConfig and passed to
# MessageHub::new().  The hub routes inbound Envelope messages to the live
# component instances registered with with_registry().
#
# queue
#   waiting_capacity  - max envelopes buffered before backpressure fires
#   dispatch_capacity - channel depth between router and each dispatcher
#   backpressure      - "reject" (error to caller) | "drop_oldest"
#
# routes.rules  - evaluated top-to-bottom; first matching rule wins
#   filters     - all filters in the list must match (AND)
#     kind: all           matches every envelope (no config needed)
#     kind: match         field/value/mode string match
#       field: kind | owner | format
#       mode:  exact | contains | regex
#   targets     - all targets in the list receive the envelope (fan-out)
#     kind: components    dispatch to named/kind-prefixed live components
#     kind: drop          silently discard (useful as an explicit catch-all)
hub:
  queue:
    waiting_capacity: 1024
    dispatch_capacity: 256
    backpressure: reject

  routes:
    rules:
      # Fan-out: log events go to BOTH loggers.
      # console-logger applies min_level=warn; audit-logger captures everything.
      - name: log-fan-out
        filters:
          - kind: match
            config:
              field: kind
              value: "^sample/Log$"
              mode: regex
        targets:
          - kind: components
            config:
              targets:
                - name: console-logger
                - name: audit-logger

      # Calculator messages.
      - name: calculator-route
        filters:
          - kind: match
            config:
              field: kind
              value: "sample/Calculate"
              mode: exact
        targets:
          - kind: components
            config:
              targets:
                - name: calculator

      # All counter actions share a common kind prefix.
      - name: counter-route
        filters:
          - kind: match
            config:
              field: kind
              value: "^sample/Counter/"
              mode: regex
        targets:
          - kind: components
            config:
              targets:
                - name: request-counter

      # Echo messages.
      - name: echo-route
        filters:
          - kind: match
            config:
              field: kind
              value: "sample/Echo"
              mode: exact
        targets:
          - kind: components
            config:
              targets:
                - name: health-echo

      # Catch-all: drop anything that did not match a rule above.
      # Remove this rule to let unmatched envelopes accumulate in the
      # "zero routes matched" counter instead.
      - name: drop-unmatched
        filters:
          - kind: all
            config: {}
        targets:
          - kind: drop
            config: {}