plugins:
  directories:
    - path: target/debug

servers:
  # ── Workflow catalog ─────────────────────────────────────────────────────────
  - name: catalog-server
    kind: workaholic/CatalogServer:1.0
    config:
      load_on_startup: true
      loader:
        path: examples/workaholic

  # ── Workflow execution engine ─────────────────────────────────────────────────
  - name: workflow-server
    kind: workaholic/WorkflowServer:1.0
    config:
      default_namespace: testing
      persistence:
        kind: memory
      workers:
        - name: main-worker
          kind: thread
          max_work_runs: 4
          max_task_runs: 16
        - name: analytics-worker
          kind: thread
          max_work_runs: 2
          max_task_runs: 8

  # ── Logging ──────────────────────────────────────────────────────────────────
  - name: log-server
    kind: sample/LoggingServer:1.0
    config:
      formatter: { kind: text }
      consumers:
        - kind: console

  # ── HTTP gateway ──────────────────────────────────────────────────────────────
  - name: rest-server
    kind: sample/RestServer:1.0
    config:
      bind: "0.0.0.0:8080"
      routes:
        - path: /health    method: GET  action: ping/Ping
        - path: /works      method: GET  action: catalog/ListWorks
        - path: /tasks      method: GET  action: catalog/ListTasks
        - path: /worflows   method: POST action: workflow/CreateWorkRun
        - path: /workflows  method: GET  action: workflow/ListWorkRuns

hub:
  queue:
    waiting_capacity: 4096
    dispatch_capacity: 256
    backpressure: reject
  routes:
    rules:
      - name: route-logs
        filters:
          - kind: match
            config: { field: kind, mode: contains, value: "log/" }
        targets:
          - kind: components
            config: { name: log-server }
      - name: drop-unhandled
        filters:
          - kind: all
        targets:
          - kind: drop
