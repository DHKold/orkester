# ── Smoke-test workflow ────────────────────────────────────────────────────────
kind: orkester/work:1.0
name: smoke-test
namespace: testing
version: 1.0.0
metadata:
  description: Quick smoke-test — runs a single echo task
  tags: [test]
spec:
  params:
    - name: message
      required: false
      default: "Hello from orchestration!"
  tasks:
    - name: greet
      task_ref: echo-hello
      inputs:
        message: "{{ params.message }}"
  failure_policy:
    mode: fail_fast

---
# ── Analytics ETL pipeline ─────────────────────────────────────────────────────
kind: orkester/work:1.0
name: analytics-etl
namespace: analytics
version: 1.0.0
metadata:
  description: Extract → Transform → Load pipeline for analytics data
  tags: [analytics, etl, pipeline]
spec:
  params:
    - name: source_path
      required: true
    - name: destination
      required: true
    - name: staging_path
      required: false
      default: /tmp/staging
  tasks:
    - name: extract
      task_ref: extract-data
      inputs:
        source_path: "{{ params.source_path }}"
        output_path: "{{ params.staging_path }}/raw"

    - name: transform
      task_ref: transform-data
      depends_on: [extract]
      inputs:
        input_path: "{{ params.staging_path }}/raw"
        output_path: "{{ params.staging_path }}/transformed"

    - name: load
      task_ref: load-data
      depends_on: [transform]
      inputs:
        source_path: "{{ params.staging_path }}/transformed"
        destination: "{{ params.destination }}"

  concurrency:
    max_parallel_tasks: 4
  failure_policy:
    mode: fail_fast
